services:
  - type: web
    name: eluno-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./oms.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
