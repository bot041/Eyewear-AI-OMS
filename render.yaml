      - key: OPERATIONS_EMAIL
        value: "samasur018@gmail.com"
      - key: EMAIL_FROM
        value: "samasur018@gmail.com"
      - key: ALERT_FROM_EMAIL
        value: "samasur018@gmail.com"
      - key: ALERT_TO_EMAIL
        value: "samasur018@gmail.com"
